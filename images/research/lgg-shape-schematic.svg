<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="100%" role="img" aria-labelledby="lggTitle">
<title id="lggTitle">Statistical shape analysis of MRI-derived tumor contours in lower-grade glioma: PCA mode of variation</title>
<rect x="1" y="1" width="478" height="298" rx="12" fill="#ffffff" stroke="#dfe6ea"/>
<text x="24" y="30" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f3b57">MRI tumor shape — PCA mode of variation</text>

<!-- three brain slice panels -->
<g>
  <!-- panel 1: mean - 2SD -->
  <circle cx="110" cy="165" r="86" fill="#f3f5f6" stroke="#cdd6db"/>
  <path d="M90,150 C75,120 130,105 150,130 C168,152 150,190 120,195 C95,198 82,175 90,150 Z"
        fill="#ee5f5b" fill-opacity="0.18" stroke="#ee5f5b" stroke-width="2"/>
  <text x="110" y="272" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#3a4750">mean − 2 SD (regular)</text>

  <!-- panel 2: mean -->
  <circle cx="240" cy="165" r="86" fill="#f3f5f6" stroke="#cdd6db"/>
  <path d="M210,145 C195,110 260,95 285,125 C305,150 295,195 255,205 C220,212 198,180 210,145 Z"
        fill="#f89406" fill-opacity="0.2" stroke="#f89406" stroke-width="2"/>
  <text x="240" y="272" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#3a4750">mean shape</text>

  <!-- panel 3: mean + 2SD -->
  <circle cx="370" cy="165" r="86" fill="#f3f5f6" stroke="#cdd6db"/>
  <path d="M330,150 C300,105 385,80 415,120 C440,155 430,210 375,222 C325,232 300,190 330,150 Z"
        fill="#1f3b57" fill-opacity="0.18" stroke="#1f3b57" stroke-width="2"/>
  <text x="370" y="272" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#3a4750">mean + 2 SD (irregular)</text>
</g>

<text x="24" y="292" font-family="Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#7a8288">Increasing boundary irregularity along PC1 is associated with genomic subtype and survival</text>
</svg>
