<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="100%" role="img" aria-labelledby="rismTitle">
<title id="rismTitle">RISM: radiomic feature integration with spike-and-slab selection for multimodal survival analysis</title>
<rect x="1" y="1" width="478" height="298" rx="12" fill="#ffffff" stroke="#dfe6ea"/>
<text x="24" y="30" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f3b57">RISM — multimodal spike-and-slab survival model</text>

<!-- input blocks -->
<rect x="24" y="55" width="120" height="60" rx="8" fill="#eef2f5" stroke="#1f3b57" stroke-width="1.4"/>
<text x="84" y="80" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#1f3b57">MRI radiomic</text>
<text x="84" y="96" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#1f3b57">features</text>

<rect x="24" y="130" width="120" height="60" rx="8" fill="#eef6f7" stroke="#1b7f8b" stroke-width="1.4"/>
<text x="84" y="155" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#154a52">Other modality</text>
<text x="84" y="171" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#154a52">features</text>

<!-- arrows into selection layer -->
<g stroke="#7a8288" stroke-width="1.6" fill="none" marker-end="url(#arrow2)">
<path d="M144,85 L188,110"/>
<path d="M144,160 L188,135"/>
</g>
<defs>
<marker id="arrow2" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
  <path d="M0,0 L8,4 L0,8 z" fill="#7a8288"/>
</marker>
</defs>

<!-- spike-and-slab coefficient bars -->
<text x="196" y="70" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#7a8288">spike-and-slab selection</text>
<g>
  <rect x="196" y="100" width="18" height="70" fill="#d7dde0"/>
  <rect x="196" y="150" width="18" height="20" fill="#1f3b57"/>
  <rect x="222" y="100" width="18" height="70" fill="#d7dde0"/>
  <rect x="222" y="164" width="18" height="6" fill="#1f3b57"/>
  <rect x="248" y="100" width="18" height="70" fill="#d7dde0"/>
  <rect x="248" y="120" width="18" height="50" fill="#1f3b57"/>
  <rect x="274" y="100" width="18" height="70" fill="#d7dde0"/>
  <rect x="274" y="167" width="18" height="3" fill="#1f3b57"/>
  <rect x="300" y="100" width="18" height="70" fill="#d7dde0"/>
  <rect x="300" y="135" width="18" height="35" fill="#1f3b57"/>
</g>
<text x="196" y="188" font-family="Helvetica Neue, Arial, sans-serif" font-size="9.5" fill="#7a8288">grey = shrunk to spike (excluded), navy = retained (slab)</text>

<!-- arrow to survival curve -->
<path d="M326,135 L360,135" stroke="#7a8288" stroke-width="1.6" fill="none" marker-end="url(#arrow2)"/>

<!-- KM-style survival curve -->
<rect x="360" y="55" width="96" height="135" rx="6" fill="#fbfbfc" stroke="#dfe6ea"/>
<polyline points="370,70 400,70 400,90 415,90 415,110 430,110 430,140 446,140 446,175"
  fill="none" stroke="#1f3b57" stroke-width="2"/>
<polyline points="370,70 385,95 385,120 400,120 400,150 420,150 420,170 446,170 446,185"
  fill="none" stroke="#ee5f5b" stroke-width="2"/>
<text x="408" y="200" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7a8288">predicted survival</text>

<text x="24" y="260" font-family="Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#7a8288">Spike-and-slab priors jointly select informative features across modalities for survival prediction</text>
</svg>
